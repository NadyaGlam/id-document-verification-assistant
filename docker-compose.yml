version: "3.8"

services:
  api:
    build: .
    container_name: id-doc-verify-api
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./sample_images:/app/sample_images
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
